<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Créer un compte</h1>

<form id="registerForm">

    <input
        type="text"
        id="name"
        placeholder="Nom"
        required>

    <input
        type="email"
        id="email"
        placeholder="Email"
        required>

    <input
        type="password"
        id="password"
        placeholder="Mot de passe"
        required>

    <button type="submit">
        S'inscrire
    </button>

</form>

<script src="js/auth.js"></script>

</body>
</html>
